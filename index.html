<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Base Apparel</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="container">
      <a href="#" id="logo"
        ><img src="./images/logo.svg" alt="logo" width="300"
      /></a>
      <div class="hero">
        <picture>
          <source
            class="desktop"
            media="(min-width: 769px)"
            srcset="./images/hero-desktop.jpg"
          />
          <img src="./images/hero-mobile.jpg" alt="" />
        </picture>
      </div>
      <div class="content">
        <h1 class="title">We're <span>coming soon</span></h1>

        <p class="description">
          Hello fellow shoppers! We're currently building our new fashion store.
          Add your email below to stay up-to-date with announcements and our
          launch deals.
        </p>

        <form action="#" id="contact">
          <div>
            <input type="email" placeholder="Email Address" />
            <span
              id="email-error"
              class="error"
              role="alert"
              aria-live="polite"
              hidden
              >Please provide a valid email</span
            >
          </div>
          <button><img src="./images/icon-arrow.svg" alt="" /></button>
        </form>
      </div>
    </main>
    <script src="script.js"></script>
  </body>
</html>
